name: CD — Deploy to Google Cloud Run

on:
  push:
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false  # Never cancel an in-flight production deploy

env:
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  REPO_NAME: tiffo
  BACKEND_SERVICE: tiffo
  FRONTEND_SERVICE: tiffo-frontend

jobs:
  # ============================================================
  # 1. AUTHENTICATE WITH GOOGLE CLOUD
  # ============================================================
  setup:
    name: 🔐 Authenticate GCP
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

  # ============================================================
  # 2. BUILD & PUSH BACKEND IMAGE
  # ============================================================
  build-backend:
    name: 🔧 Build & Push Backend
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tiffo/tiffo-backend:${{ github.sha }}
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tiffo/tiffo-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # 3. BUILD & PUSH FRONTEND IMAGE
  # ============================================================
  build-frontend:
    name: 🎨 Build & Push Frontend
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          tags: |
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tiffo/tiffo-frontend:${{ github.sha }}
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tiffo/tiffo-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # 4. DEPLOY BACKEND TO CLOUD RUN
  # ============================================================
  deploy-backend:
    name: 🚀 Deploy Backend → Cloud Run
    runs-on: ubuntu-latest
    needs: build-backend
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy backend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/tiffo-backend:${{ github.sha }}
          flags: '--allow-unauthenticated --platform=managed --memory=512Mi --cpu=1 --min-instances=0 --max-instances=5'
          env_vars: |
            NODE_ENV=production
          secrets: |
            MONGODB_URI=MONGODB_URI:latest
            JWT_SECRET=JWT_SECRET:latest
            CLOUDINARY_CLOUD_NAME=CLOUDINARY_CLOUD_NAME:latest
            CLOUDINARY_API_KEY=CLOUDINARY_API_KEY:latest
            CLOUDINARY_API_SECRET=CLOUDINARY_API_SECRET:latest

      - name: Backend URL
        run: echo "✅ Backend deployed → ${{ steps.deploy.outputs.url }}"

  # ============================================================
  # 5. DEPLOY FRONTEND TO CLOUD RUN
  # ============================================================
  deploy-frontend:
    name: 🚀 Deploy Frontend → Cloud Run
    runs-on: ubuntu-latest
    needs: build-frontend
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy frontend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/tiffo-frontend:${{ github.sha }}
          flags: '--allow-unauthenticated --platform=managed --port=80 --memory=256Mi --cpu=1 --min-instances=0 --max-instances=5'

      - name: Frontend URL
        run: echo "✅ Frontend deployed → ${{ steps.deploy.outputs.url }}"
