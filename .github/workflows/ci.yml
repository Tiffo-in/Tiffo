name: CI — Lint, Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # BACKEND: Lint + Test
  # ============================================================
  backend-ci:
    name: 🔧 Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Fix formatting with Prettier
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          # Add any test-specific env vars here (use GitHub Secrets for real values)
          MONGODB_URI: ${{ secrets.TEST_MONGODB_URI || 'mongodb://localhost:27017/tiffo_test' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-key-for-ci' }}

  # ============================================================
  # FRONTEND: Lint + Build
  # ============================================================
  frontend-ci:
    name: 🎨 Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Fix formatting with Prettier
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Vite build-time env vars — set real values in GitHub Secrets
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:5001' }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY || '' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/build/
          retention-days: 7

  # ============================================================
  # DOCKER: Build images (no push) — validates Dockerfiles
  # ============================================================
  docker-build-check:
    name: 🐳 Docker — Build Validation
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (dry-run)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: tiffo-backend:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (dry-run)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: tiffo-frontend:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
