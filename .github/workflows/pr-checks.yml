name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # BACKEND: Lint, Test, Security audit
  # ============================================================
  backend-checks:
    name: 🔧 Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (with annotations)
        run: npm run lint

      - name: Run tests with coverage
        run: npm test -- --coverage
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.TEST_MONGODB_URI || 'mongodb://localhost:27017/tiffo_test' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret' }}

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true  # Warn but don't block — fix known issues separately

  # ============================================================
  # FRONTEND: Lint, Build, Security audit
  # ============================================================
  frontend-checks:
    name: 🎨 Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (with annotations)
        run: npm run lint

      - name: Build (validates no type/import errors)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5001
          VITE_GOOGLE_MAPS_API_KEY: dummy-key-for-build

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # ============================================================
  # POST SUMMARY
  # ============================================================
  pr-summary:
    name: ✅ PR Summary
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    if: always()
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Post PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const backendStatus = '${{ needs.backend-checks.result }}';
            const frontendStatus = '${{ needs.frontend-checks.result }}';

            const icon = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '❌';

            const body = `## CI Check Summary

            | Job | Status |
            |-----|--------|
            | 🔧 Backend (Lint + Test + Audit) | ${icon(backendStatus)} ${backendStatus} |
            | 🎨 Frontend (Lint + Build + Audit) | ${icon(frontendStatus)} ${frontendStatus} |

            **Commit:** \`${{ github.sha }}\`
            **Branch:** \`${{ github.head_ref }}\`
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.user.login === 'github-actions[bot]' && c.body.includes('CI Check Summary'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
