steps:
  # =========================================================================
  # 1. BUILD AND DEPLOY BACKEND
  # =========================================================================
  
  # Build backend container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tiffo/tiffo-backend:$COMMIT_SHA',
      '-f', 'backend/Dockerfile',
      'backend'
    ]

  # Push backend image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/tiffo/tiffo-backend:$COMMIT_SHA']

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'tiffo',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/tiffo/tiffo-backend:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

  # =========================================================================
  # 2. BUILD AND DEPLOY FRONTEND
  # =========================================================================

  # Build frontend container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tiffo/tiffo-frontend:$COMMIT_SHA',
      '-f', 'frontend/Dockerfile',
      'frontend'
    ]

  # Push frontend image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/tiffo/tiffo-frontend:$COMMIT_SHA']

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'tiffo-frontend',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/tiffo/tiffo-frontend:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '80'
    ]

options:
  logging: CLOUD_LOGGING_ONLY
